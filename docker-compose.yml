version: "3.9"

services:
  vllm-server:
    build: .
    container_name: vllm-hr-promotion
    restart: unless-stopped

    ports:
      - "8000:8000"

    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface

    env_file:
      - .env

    gpus: all
    ipc: host

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s