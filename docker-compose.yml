services:
  vllm-server:
    image: vllm/vllm-openai:latest
    container_name: vllm-hr-promotion
    ports:
      - "8000:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    gpus: all
    ipc: host
    restart: unless-stopped
    command: >
      Qwen/Qwen2.5-0.5B-Instruct
      --enforce-eager
      --max-model-len 1024
      --gpu-memory-utilization 0.6
      --dtype float16
      --host 0.0.0.0
      --port 8000